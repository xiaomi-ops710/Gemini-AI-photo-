<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material AI Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  <style>
    :root {
      --md-sys-color-primary: #006495;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #cbe6ff;
      --md-sys-color-on-primary-container: #001e30;
      --md-sys-color-surface: #fdfcff;
      --md-sys-color-on-surface: #1a1c1e;
      --md-sys-color-surface-container: #eff1f4;
      --md-sys-color-surface-container-high: #e3e6eb;
      --border-radius-large: 28px;
      --border-radius-extra-large: 32px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
    }
    header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 8px 16px; }
    header h1 { font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 12px; }
    .icon-btn {
      background: var(--md-sys-color-surface-container-high); border: none; border-radius: 50%; width: 48px; height: 48px;
      display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--md-sys-color-on-surface);
    }
    main { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
    .image-card {
      background-color: var(--md-sys-color-surface-container); border-radius: var(--border-radius-extra-large);
      aspect-ratio: 1 / 1; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;
    }
    .image-card img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .placeholder-content { text-align: center; color: #8e9196; }
    .placeholder-content .material-symbols-rounded { font-size: 80px; margin-bottom: 12px; opacity: 0.5; }
    .loader { display: none; width: 50px; height: 50px; border: 5px solid var(--md-sys-color-primary-container); border-top: 5px solid var(--md-sys-color-primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .input-card { background: var(--md-sys-color-surface-container); border-radius: var(--border-radius-large); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    textarea { width: 100%; background: transparent; border: none; resize: none; outline: none; font-size: 1rem; font-family: inherit; height: 100px; padding: 8px; }
    .footer-actions { display: flex; justify-content: space-between; align-items: center; }
    .btn-generate { background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border: none; border-radius: 24px; padding: 12px 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: var(--md-sys-color-surface); padding: 32px; border-radius: var(--border-radius-large); width: 90%; max-width: 400px; }
    input[type="password"] { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid var(--md-sys-color-surface-container-high); margin-bottom: 20px; outline: none; }
    .btn-save { width: 100%; padding: 14px; border-radius: 20px; border: none; background: var(--md-sys-color-primary); color: white; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h1><span class="material-symbols-rounded">tempest</span> AI Studio</h1>
    <button class="icon-btn" id="openSettings"><span class="material-symbols-rounded">settings</span></button>
  </header>
  <main>
    <div class="image-card">
      <div class="placeholder-content" id="placeholder">
        <span class="material-symbols-rounded">image_search</span>
        <p>日本語で指示を入力</p>
      </div>
      <div class="loader" id="loader"></div>
      <img id="outputImg" alt="Generated Image">
    </div>
    <div class="input-card">
      <textarea id="promptInput" placeholder="例: 夕暮れのサイバーパンクな都市"></textarea>
      <div class="footer-actions">
        <button class="icon-btn" id="dlBtn" style="visibility: hidden;"><span class="material-symbols-rounded">download</span></button>
        <button class="btn-generate" id="genBtn"><span class="material-symbols-rounded">auto_awesome</span> 生成</button>
      </div>
    </div>
  </main>
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>APIキー設定</h2>
      <input type="password" id="keyInput" placeholder="AIzaSy...">
      <button class="btn-save" id="saveBtn">保存</button>
    </div>
  </div>

  <script>
    const el = {
      open: document.getElementById('openSettings'),
      modal: document.getElementById('modal'),
      save: document.getElementById('saveBtn'),
      key: document.getElementById('keyInput'),
      gen: document.getElementById('genBtn'),
      prompt: document.getElementById('promptInput'),
      img: document.getElementById('outputImg'),
      ph: document.getElementById('placeholder'),
      loader: document.getElementById('loader'),
      dl: document.getElementById('dlBtn')
    };

    const storedKey = localStorage.getItem('gemini_api_key');
    if (storedKey) el.key.value = storedKey;
    else el.modal.classList.add('active');

    el.open.onclick = () => el.modal.classList.add('active');
    el.save.onclick = () => {
      localStorage.setItem('gemini_api_key', el.key.value);
      el.modal.classList.remove('active');
    };

    async function translateText(apiKey, text) {
      if (!/[^\x00-\x7F]/.test(text)) return text;
      // v1 エンドポイントを使用
      const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: `Translate to English for image prompt: ${text}` }] }] })
      });
      const data = await response.json();
      return data.candidates[0].content.parts[0].text;
    }

    el.gen.onclick = async () => {
      const apiKey = localStorage.getItem('gemini_api_key');
      const inputPrompt = el.prompt.value.trim();
      if (!apiKey || !inputPrompt) return alert("設定を確認してください");

      el.gen.disabled = true;
      el.ph.style.display = "none";
      el.img.style.display = "none";
      el.loader.style.display = "block";

      try {
        const finalPrompt = await translateText(apiKey, inputPrompt);
        
        // エンドポイントを v1 に、モデル指定を標準的なパスに変更
        const url = `https://generativelanguage.googleapis.com/v1/models/imagen-3.0-generate-001:predict?key=${apiKey}`;

        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            instances: [{ prompt: finalPrompt }],
            parameters: { sampleCount: 1, aspectRatio: "1:1" }
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const b64 = data.predictions[0].bytesBase64Encoded;
        const finalUrl = `data:image/png;base64,${b64}`;
        el.img.src = finalUrl;
        el.img.style.display = "block";
        el.dl.style.visibility = "visible";
        el.dl.onclick = () => {
          const a = document.createElement('a');
          a.href = finalUrl;
          a.download = "image.png";
          a.click();
        };
      } catch (err) {
        alert("エラー: " + err.message);
        el.ph.style.display = "block";
      } finally {
        el.gen.disabled = false;
        el.loader.style.display = "none";
      }
    };
  </script>
</body>
</html>
